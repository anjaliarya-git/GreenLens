<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenLens - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 80px;
            color: #2e7d32;
            margin-bottom: 15px;
            display: block;
        }

        .logo h1 {
            color: #2e7d32;
            font-size: 36px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab:hover {
            border-color: #66bb6a;
        }

        .tab.active {
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
            border-color: #2e7d32;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #66bb6a;
            box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .role-option {
            padding: 15px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-option:hover {
            border-color: #66bb6a;
            background: #f1f8e9;
        }

        .role-option.selected {
            border-color: #2e7d32;
            background: #c8e6c9;
        }

        .role-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .role-label {
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        .dept-selector {
            display: none;
            margin-top: 15px;
        }

        .dept-selector.active {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .submit-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-message.active {
            display: block;
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #66bb6a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- GreenLens Leaf Logo -->
            <i class="fa-solid fa-leaf"></i>
            </div>
            <h1>GreenLens</h1>
          
        

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <!-- Login Form -->
        <div class="form-section active" id="loginForm">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">Login</button>
            </form>
            <p class="info-text">New to GreenLens? Click Sign Up above</p>
        </div>

        <!-- Signup Form -->
        <div class="form-section" id="signupForm">
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" required placeholder="Create a password (min 6 characters)" minlength="6">
                </div>
                
                <div class="form-group">
                    <label>Select Your Role</label>
                    <div class="role-selector">
                        <div class="role-option" onclick="selectRole('student')">
                            <div class="role-icon">👨‍🎓</div>
                            <div class="role-label">Student</div>
                        </div>
                        <div class="role-option" onclick="selectRole('worker')">
                            <div class="role-icon">🔧</div>
                            <div class="role-label">Worker</div>
                        </div>
                        <div class="role-option" onclick="selectRole('admin')">
                            <div class="role-icon">👨‍💼</div>
                            <div class="role-label">Admin</div>
                        </div>
                    </div>
                    <input type="hidden" id="selectedRole" required>
                </div>

                <div class="dept-selector" id="deptSelector">
                    <label>Select Department</label>
                    <select id="department">
                        <option value="">Choose Department</option>
                        <option value="Facilities">🏢 Facilities</option>
                        <option value="Utilities">⚡ Utilities</option>
                        <option value="Waste Management">♻️ Waste Management</option>
                        <option value="Safety">🔥 Safety</option>
                        <option value="Maintenance">🔧 Maintenance</option>
                        <option value="Environment">🌳 Environment</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>
            </form>
            <p class="info-text">Already have an account? Click Login above</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Please wait...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

 const firebaseConfig = {
  apiKey: "AIzaSyBzOWPZ5UhoJte2LRNo7YtRQD_-mx7Rb5E",
  authDomain: "greenlens-6cd3e.firebaseapp.com",
  projectId: "greenlens-6cd3e",
  storageBucket: "greenlens-6cd3e.firebasestorage.app",
  messagingSenderId: "698372050167",
  appId: "1:698372050167:web:982a02c2a1d94586ff17f2",
  measurementId: "G-HBSYVFBNJY"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedRole = null;

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            hideError();
        };

        window.selectRole = function(role) {
            document.querySelectorAll('.role-option').forEach(opt => 
                opt.classList.remove('selected')
            );
            event.target.closest('.role-option').classList.add('selected');
            selectedRole = role;
            document.getElementById('selectedRole').value = role;

            const deptSelector = document.getElementById('deptSelector');
            if (role === 'worker') {
                deptSelector.classList.add('active');
                document.getElementById('department').required = true;
            } else {
                deptSelector.classList.remove('active');
                document.getElementById('department').required = false;
                document.getElementById('department').value = '';
            }
        };

        window.handleLogin = async function(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                showLoading();
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    redirectUser(userData.role);
                } else {
                    throw new Error('User data not found');
                }
            } catch (error) {
                hideLoading();
                console.error('Login error:', error);
                showError(getErrorMessage(error.code));
            }
        };

        window.handleSignup = async function(event) {
            event.preventDefault();

            if (!selectedRole) {
                showError('Please select a role');
                return;
            }

            if (selectedRole === 'worker' && !document.getElementById('department').value) {
                showError('Please select a department for worker role');
                return;
            }

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const department = document.getElementById('department').value;

            try {
                showLoading();
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userData = {
                    email: email,
                    role: selectedRole,
                    createdAt: serverTimestamp()
                };

                if (selectedRole === 'student') {
                    userData.studentName = name;
                    userData.greenCredits = 0;
                    userData.reportsSubmitted = 0;
                    userData.redeemedRewards = [];
                } else if (selectedRole === 'worker') {
                    userData.workerName = name;
                    userData.department = department;
                } else if (selectedRole === 'admin') {
                    userData.adminName = name;
                }

                await setDoc(doc(db, 'users', user.uid), userData);
                redirectUser(selectedRole);
            } catch (error) {
                hideLoading();
                console.error('Signup error:', error);
                showError(getErrorMessage(error.code));
            }
        };

        function redirectUser(role) {
            switch(role) {
                case 'student':
                    window.location.href = 'student.html';
                    break;
                case 'worker':
                    window.location.href = 'worker.html';
                    break;
                case 'admin':
                    window.location.href = 'admin.html';
                    break;
                default:
                    window.location.href = 'student.html';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('active');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('loginBtn')?.setAttribute('disabled', 'true');
            document.getElementById('signupBtn')?.setAttribute('disabled', 'true');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
            document.getElementById('loginBtn')?.removeAttribute('disabled');
            document.getElementById('signupBtn')?.removeAttribute('disabled');
        }

        function getErrorMessage(code) {
            switch(code) {
                case 'auth/user-not-found':
                    return 'No account found with this email';
                case 'auth/wrong-password':
                    return 'Incorrect password';
                case 'auth/email-already-in-use':
                    return 'An account with this email already exists';
                case 'auth/weak-password':
                    return 'Password should be at least 6 characters';
                case 'auth/invalid-email':
                    return 'Invalid email address';
                case 'auth/invalid-credential':
                    return 'Invalid email or password';
                default:
                    return 'An error occurred. Please try again.';
            }
        }
    </script>
</body>
</html>
