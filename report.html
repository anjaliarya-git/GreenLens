<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Verified Report - GreenLens</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh; padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
            color: white; padding: 20px 40px; border-radius: 12px;
            margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {font-size: 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .ai-badge {
            background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px;
            font-size: 14px; display: inline-flex; align-items: center; gap: 5px;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: white;
            padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .back-btn {
            display: inline-block; padding: 10px 20px; background: #757575;
            color: white; text-decoration: none; border-radius: 8px;
            margin-bottom: 20px; transition: all 0.3s;
        }
        .back-btn:hover {background: #616161;}
        .verification-status {
            padding: 20px; border-radius: 8px; margin-bottom: 30px;
            display: none; animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from {opacity: 0; transform: translateY(-10px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .verification-status.checking {display: block; background: #fff3cd; border-left: 4px solid #ffc107;}
        .verification-status.verified {display: block; background: #d4edda; border-left: 4px solid #28a745;}
        .verification-status.duplicate {display: block; background: #f8d7da; border-left: 4px solid #dc3545;}
        .verification-status.clustered {display: block; background: #d1ecf1; border-left: 4px solid #0c5460;}
        .status-icon {font-size: 24px; margin-right: 10px;}
        .confidence-bar {
            width: 100%; height: 10px; background: #e0e0e0;
            border-radius: 5px; margin-top: 10px; overflow: hidden;
        }
        .confidence-fill {
            height: 100%; background: linear-gradient(90deg, #66bb6a 0%, #43a047 100%);
            transition: width 0.5s;
        }
        .priority-display {margin: 15px 0; padding: 15px; border-radius: 8px; border: 2px solid #e0e0e0;}
        .priority-indicator {
            display: inline-block; padding: 8px 16px; border-radius: 20px;
            font-weight: bold; font-size: 14px;
        }
        .priority-CRITICAL {background: #ffebee; color: #c62828; border: 2px solid #c62828;}
        .priority-HIGH {background: #fff3e0; color: #e65100; border: 2px solid #e65100;}
        .priority-MEDIUM {background: #fffde7; color: #f57f17; border: 2px solid #f57f17;}
        .priority-LOW {background: #e8f5e9; color: #2e7d32; border: 2px solid #2e7d32;}
        .form-group {margin-bottom: 25px;}
        label {display: block; font-weight: bold; color: #333; margin-bottom: 8px; font-size: 16px;}
        label .required {color: #d32f2f;}
        select, input, textarea {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 16px; font-family: inherit; transition: all 0.3s;
        }
        select:focus, input:focus, textarea:focus {
            outline: none; border-color: #66bb6a;
            box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.1);
        }
        textarea {resize: vertical; min-height: 120px;}
        .issue-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px; margin-top: 10px;
        }
        .issue-option {
            border: 2px solid #e0e0e0; padding: 10px; border-radius: 8px;
            cursor: pointer; text-align: center; transition: all 0.3s;
            background: white; font-size: 12px;
        }
        .issue-option:hover {border-color: #66bb6a; background: #f1f8e9;}
        .issue-option.selected {border-color: #2e7d32; background: #c8e6c9; font-weight: bold;}
        .location-capture {border: 2px solid #e0e0e0; padding: 20px; border-radius: 8px; margin-top: 10px;}
        .location-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #42a5f5 0%, #1e88e5 100%);
            color: white; border: none; border-radius: 8px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: all 0.3s;
        }
        .location-btn:hover:not(:disabled) {transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2);}
        .location-btn:disabled {background: #bdbdbd;}
        .location-display {margin-top: 15px; padding: 12px; background: #f5f5f5; border-radius: 8px; display: none;}
        .location-display.active {display: block;}
        .location-label {font-weight: bold; color: #2e7d32; margin-bottom: 5px;}
        .location-value {color: #666; font-size: 14px;}
        .image-upload {
            border: 2px dashed #bdbdbd; padding: 30px; text-align: center;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .image-upload:hover {border-color: #66bb6a; background: #f1f8e9;}
        #imageInput {display: none;}
        .image-preview {margin-top: 20px; display: none;}
        .image-preview img {max-width: 100%; max-height: 300px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .submit-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white; border: none; border-radius: 8px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .submit-btn:hover:not(:disabled) {transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2);}
        .submit-btn:disabled {background: #bdbdbd; cursor: not-allowed;}
        .loading {display: none; text-align: center; padding: 20px;}
        .loading.active {display: block;}
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #66bb6a;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin {0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }}
    </style>
</head>
<body>
    <div class="container">
        <a href="student.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        
        <div class="header">
            <h1>
                <i class="fa-solid fa-leaf"></i>
                AI-Verified Report System
                <span class="ai-badge"><i class="fas fa-robot"></i> AI Powered</span>
            </h1>
        </div>

        <div class="verification-status" id="verificationStatus"></div>

        <form id="reportForm">
            <div class="form-group">
                <label>Select Issue Type <span class="required">*</span></label>
                <div class="issue-grid" id="issueGrid"></div>
                <input type="hidden" id="selectedIssue" required>
                <div id="priorityDisplay"></div>
            </div>

            <div class="form-group">
                <label>Location <span class="required">*</span></label>
                <input type="text" id="location" placeholder="e.g., Building A, Room 201" required>
                
                <div class="location-capture">
                    <button type="button" class="location-btn" id="captureLocationBtn">
                        <i class="fas fa-map-marker-alt"></i> Capture GPS Location (Optional)
                    </button>
                    <div class="location-display" id="locationDisplay">
                        <div class="location-label"><i class="fas fa-check-circle"></i> GPS Coordinates:</div>
                        <div class="location-value" id="coordinates">Loading...</div>
                        <div class="location-label" style="margin-top: 10px;"><i class="fas fa-map-pin"></i> Address:</div>
                        <div class="location-value" id="address">Fetching address...</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description <span class="required">*</span></label>
                <textarea id="description" placeholder="Describe the issue in detail..." required></textarea>
            </div>

            <div class="form-group">
                <label>Upload Photo (Optional)</label>
                <div class="image-upload" id="imageUpload">
                    <div style="font-size: 48px; margin-bottom: 10px;"><i class="fas fa-camera"></i></div>
                    <p>Click to upload or drag and drop an image</p>
                    <p style="font-size: 14px; color: #666; margin-top: 10px;">PNG, JPG up to 500KB</p>
                </div>
                <input type="file" id="imageInput" accept="image/*">
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" src="" alt="Preview">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Submit Report
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Submitting your report...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBzOWPZ5UhoJte2LRNo7YtRQD_-mx7Rb5E",
            authDomain: "greenlens-6cd3e.firebaseapp.com",
            projectId: "greenlens-6cd3e",
            storageBucket: "greenlens-6cd3e.firebasestorage.app",
            messagingSenderId: "698372050167",
            appId: "1:698372050167:web:982a02c2a1d94586ff17f2",
            measurementId: "G-HBSYVFBNJY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let selectedIssue = null;
        let selectedImage = null;
        let capturedLocation = null;
        let routingInfo = null;

        const ISSUE_CATEGORIES = {
            'Fire Hazard': { dept: 'Safety', severity: 'CRITICAL', time: 15, weight: 10 },
            'Gas Leak': { dept: 'Safety', severity: 'CRITICAL', time: 15, weight: 10 },
            'Electric Shock': { dept: 'Safety', severity: 'CRITICAL', time: 15, weight: 10 },
            'Structural Damage': { dept: 'Safety', severity: 'CRITICAL', time: 15, weight: 10 },
            'Water Leakage': { dept: 'Utilities', severity: 'HIGH', time: 60, weight: 7 },
            'Electricity Wastage': { dept: 'Utilities', severity: 'HIGH', time: 60, weight: 7 },
            'Power Outage': { dept: 'Utilities', severity: 'HIGH', time: 60, weight: 7 },
            'Garbage Overflow': { dept: 'Waste Management', severity: 'MEDIUM', time: 240, weight: 5 },
            'Recycling Issue': { dept: 'Waste Management', severity: 'MEDIUM', time: 240, weight: 5 },
            'Food Waste': { dept: 'Waste Management', severity: 'MEDIUM', time: 240, weight: 5 },
            'Water Pollution': { dept: 'Environment', severity: 'MEDIUM', time: 480, weight: 5 },
            'Air Quality': { dept: 'Environment', severity: 'MEDIUM', time: 480, weight: 5 },
            'Broken Lights': { dept: 'Facilities', severity: 'LOW', time: 720, weight: 3 },
            'Damaged Equipment': { dept: 'Facilities', severity: 'LOW', time: 720, weight: 3 },
            'AC/Fan Left On': { dept: 'Facilities', severity: 'LOW', time: 720, weight: 3 },
            'Other': { dept: 'Maintenance', severity: 'LOW', time: 1440, weight: 3 }
        };

        const issueTypes = Object.keys(ISSUE_CATEGORIES);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log('User authenticated:', user.uid);
                initializeForm();
            } else {
                console.log('No user - redirecting to login');
                window.location.href = 'index.html';
            }
        });

        function initializeForm() {
            const grid = document.getElementById('issueGrid');
            grid.innerHTML = issueTypes.map(issue => `
                <div class="issue-option" onclick="selectIssue('${issue}')">
                    ${issue}
                </div>
            `).join('');
        }

        window.selectIssue = function(issue) {
            document.querySelectorAll('.issue-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            selectedIssue = issue;
            document.getElementById('selectedIssue').value = issue;
            routingInfo = ISSUE_CATEGORIES[issue];
            
            document.getElementById('priorityDisplay').innerHTML = `
                <div class="priority-display">
                    <div class="priority-indicator priority-${routingInfo.severity}">
                        <i class="fas fa-exclamation-circle"></i> ${routingInfo.severity} Priority
                    </div>
                    <div style="margin-top: 10px; color: #666; font-size: 14px;">
                        <strong>Department:</strong> ${routingInfo.dept}<br>
                        <strong>Expected Response:</strong> ${routingInfo.time} minutes<br>
                        <strong>Credits:</strong> ${routingInfo.weight} ⭐
                    </div>
                </div>
            `;
        };

        document.getElementById('captureLocationBtn').addEventListener('click', function() {
            if (!navigator.geolocation) {
                alert('Geolocation not supported by your browser');
                return;
            }
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Capturing...';
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    capturedLocation = {latitude: lat, longitude: lon, accuracy: position.coords.accuracy};
                    document.getElementById('locationDisplay').classList.add('active');
                    document.getElementById('coordinates').textContent = 
                        `${lat.toFixed(6)}, ${lon.toFixed(6)} (±${position.coords.accuracy.toFixed(0)}m)`;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await response.json();
                        document.getElementById('address').textContent = data.display_name || 'Address not available';
                        document.getElementById('location').value = 
                            data.display_name?.split(',').slice(0, 3).join(',') || `GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                    } catch (error) {
                        console.error('Address fetch error:', error);
                        document.getElementById('address').textContent = 'Could not fetch address';
                        document.getElementById('location').value = `GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                    }
                    this.innerHTML = '<i class="fas fa-check-circle"></i> Location Captured';
                    this.style.background = 'linear-gradient(135deg, #66bb6a 0%, #43a047 100%)';
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    alert('Could not get location: ' + error.message);
                    this.disabled = false;
                    this.innerHTML = '<i class="fas fa-map-marker-alt"></i> Capture GPS Location (Optional)';
                }
            );
        });

        const imageUpload = document.getElementById('imageUpload');
        const imageInput = document.getElementById('imageInput');
        imageUpload.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 500000) {
                    alert('Image must be under 500KB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImage = e.target.result;
                    document.getElementById('previewImg').src = selectedImage;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            console.log('Form submitted');
            console.log('Selected issue:', selectedIssue);
            console.log('Current user:', currentUser?.uid);
            
            // Validation
            if (!selectedIssue) {
                alert('❌ Please select an issue type');
                return;
            }

            if (!currentUser) {
                alert('❌ You must be logged in to submit a report');
                window.location.href = 'index.html';
                return;
            }

            // DUPLICATE CHECK - Integrated here before submission
            if (window.opener && window.opener.checkDuplicate) {
                const locationInput = document.getElementById('location');
                const duplicateCheck = window.opener.checkDuplicate({
                    issueType: selectedIssue,
                    location: locationInput.value,
                    timestamp: Date.now()
                });
                
                if (duplicateCheck.duplicate && duplicateCheck.confidence >= 70) {
                    const confirmSubmit = confirm(
                        `⚠️ POSSIBLE DUPLICATE DETECTED!\n\n` +
                        `Confidence: ${duplicateCheck.confidence}%\n` +
                        `Reason: ${duplicateCheck.reasoning}\n\n` +
                        `This issue may already be reported. Submit anyway?`
                    );
                    
                    if (!confirmSubmit) {
                        return; // Cancel submission
                    }
                }
            }

            const statusDiv = document.getElementById('verificationStatus');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('reportForm').style.display = 'none';

            try {
                console.log('Starting submission...');

                const reportData = {
                    userId: currentUser.uid,
                    issueType: selectedIssue,
                    location: document.getElementById('location').value,
                    description: document.getElementById('description').value,
                    imageData: selectedImage || null,
                    gpsLocation: capturedLocation || null,
                    department: routingInfo.dept,
                    severity: routingInfo.severity,
                    priority: routingInfo.severity === 'CRITICAL' ? 1 : routingInfo.severity === 'HIGH' ? 2 : routingInfo.severity === 'MEDIUM' ? 3 : 4,
                    expectedResponseTime: routingInfo.time,
                    status: 'Pending',
                    creditsAwarded: routingInfo.weight,
                    createdAt: serverTimestamp()
                };

                console.log('Report data prepared:', reportData);

                // Save to Firestore
                const docRef = await addDoc(collection(db, 'reports'), reportData);
                console.log('Report saved with ID:', docRef.id);

                // Award credits
                console.log('Awarding credits...');
                const userRef = doc(db, 'users', currentUser.uid);
                await updateDoc(userRef, {
                    greenCredits: increment(routingInfo.weight),
                    reportsSubmitted: increment(1)
                });
                console.log('Credits awarded successfully!');

                // Show success
                document.getElementById('loading').classList.remove('active');
                statusDiv.className = 'verification-status verified';
                statusDiv.innerHTML = `
                    <div style="display: flex; align-items: start;">
                        <span class="status-icon"><i class="fas fa-check-circle"></i></span>
                        <div style="flex: 1;">
                            <strong>✅ Report Submitted Successfully!</strong>
                            <p style="margin: 10px 0; font-size: 14px;">
                                Your report has been sent to the ${routingInfo.dept} department.
                            </p>
                            <p style="margin-top: 15px; color: #2e7d32; font-weight: bold;">
                                You earned ${routingInfo.weight} Green Credits! ⭐
                            </p>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    window.location.href = 'student.html';
                }, 3000);

            } catch (error) {
                console.error('DETAILED ERROR:', error);
                console.error('Error code:', error.code);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);
                
                document.getElementById('loading').classList.remove('active');
                document.getElementById('reportForm').style.display = 'block';
                document.getElementById('submitBtn').disabled = false;
                
                statusDiv.className = 'verification-status duplicate';
                statusDiv.innerHTML = `
                    <div style="display: flex; align-items: start;">
                        <span class="status-icon"><i class="fas fa-exclamation-triangle"></i></span>
                        <div>
                            <strong>❌ Failed to submit report</strong>
                            <p style="margin: 10px 0; font-size: 14px;">
                                <strong>Error:</strong> ${error.message || 'Unknown error'}
                            </p>
                            <p style="margin: 5px 0; font-size: 14px; color: #666;">
                                Error Code: ${error.code || 'N/A'}
                            </p>
                            <p style="margin: 10px 0; font-size: 14px;">
                                Please try again. If the problem persists, check your internet connection.
                            </p>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
